# Sensitive credentials.
# !! DO NOT commit real values — replace CHANGE_ME placeholders via CI/CD
#    (e.g. kubectl create secret generic kyc-rag-secrets --from-env-file=.env.prod)
#    or use an external secrets operator (e.g. ExternalSecrets, Vault Agent).
apiVersion: v1
kind: Secret
metadata:
  name: kyc-rag-secrets
  namespace: kyc-rag
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"
  MINIO_ACCESS_KEY: "CHANGE_ME"
  MINIO_SECRET_KEY: "CHANGE_ME"
  # Azure Form Recognizer — leave empty if not using Azure OCR
  AZURE_FORM_RECOGNIZER_ENDPOINT: ""
  AZURE_FORM_RECOGNIZER_KEY: ""
  # OpenAI / GPT-4V key — required when DEFAULT_OCR_PROVIDER=gpt4v
  OPENAI_API_KEY: "CHANGE_ME"
