version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kyc_rag
    ports:
      - "5432:5432"
    volumes:
      - ./db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  ocr_service:
    build: ./ocr_service
    ports:
      - "8001:8001"
    env_file:
      - ./ocr_service/.env
    volumes:
      - ./ocr_service:/app

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - shared_data:/shared
    ports:
      - "8000:8000"
    environment:
      # ── Infrastructure ───────────────────────────────────────────────────────
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      # ── Embeddings & Reranking ───────────────────────────────────────────────
      - EMBEDDING_MODEL_NAME=BAAI/bge-m3
      - RERANKER_MODEL_NAME=BAAI/bge-reranker-v2-m3
      - SPARSE_EMBEDDING_MODEL_NAME=prithivida/Splade_PP_en_v1
      - EMBEDDING_BATCH_SIZE=256
      - QUERY_EMBEDDING_CACHE_TTL=60
      - RERANKER_TIMEOUT_S=3.0
      # ── Ingestion ────────────────────────────────────────────────────────────
      - MAX_FILE_SIZE_BYTES=52428800
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
      - MIN_CHUNK_LENGTH=50
      - EXCEL_ROWS_PER_CHUNK=20
      - OCR_SERVICE_URL=http://ocr_service:8001/ocr
      - OCR_RETRY_ATTEMPTS=3
      - OCR_RETRY_WAIT_S=2.0
      # ── Retrieval & Graph ────────────────────────────────────────────────────
      - DETERMINISTIC_BYPASS_ENTITY_TYPES=PASSPORT_NUM,ORG,ADDRESS
      - RRF_K=60
      - RRF_DENSE_WEIGHT=0.7
      - RERANKER_CONFIDENCE_CUTOFF=0.5
      - GRAPH_FREQUENCY_THRESHOLD=2
      - GRAPH_SEMANTIC_THRESHOLD=0.8
      - GRAPH_MAX_DEPTH=2
      - QUERY_CACHE_TTL=3600
      # ── OCR Provider ─────────────────────────────────────────────────────────
      - DEFAULT_OCR_PROVIDER=gpt4v
      - AZURE_FORM_RECOGNIZER_MODEL_ID=prebuilt-read
      # AZURE_FORM_RECOGNIZER_ENDPOINT and AZURE_FORM_RECOGNIZER_KEY: set via .env for Azure OCR
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      ocr_service:
        condition: service_started

  worker:
    build: .
    command: celery -A app.core.celery_app worker --loglevel=info -Q main-queue
    volumes:
      - .:/app
      - shared_data:/shared
    environment:
      # ── Infrastructure ───────────────────────────────────────────────────────
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      # ── Embeddings & Reranking ───────────────────────────────────────────────
      - EMBEDDING_MODEL_NAME=BAAI/bge-m3
      - RERANKER_MODEL_NAME=BAAI/bge-reranker-v2-m3
      - SPARSE_EMBEDDING_MODEL_NAME=prithivida/Splade_PP_en_v1
      - EMBEDDING_BATCH_SIZE=256
      - QUERY_EMBEDDING_CACHE_TTL=60
      - RERANKER_TIMEOUT_S=3.0
      # ── Ingestion ────────────────────────────────────────────────────────────
      - MAX_FILE_SIZE_BYTES=52428800
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
      - MIN_CHUNK_LENGTH=50
      - EXCEL_ROWS_PER_CHUNK=20
      - OCR_SERVICE_URL=http://ocr_service:8001/ocr
      - OCR_RETRY_ATTEMPTS=3
      - OCR_RETRY_WAIT_S=2.0
      # ── Retrieval & Graph ────────────────────────────────────────────────────
      - DETERMINISTIC_BYPASS_ENTITY_TYPES=PASSPORT_NUM,ORG,ADDRESS
      - RRF_K=60
      - RRF_DENSE_WEIGHT=0.7
      - RERANKER_CONFIDENCE_CUTOFF=0.5
      - GRAPH_FREQUENCY_THRESHOLD=2
      - GRAPH_SEMANTIC_THRESHOLD=0.8
      - GRAPH_MAX_DEPTH=2
      - QUERY_CACHE_TTL=3600
      # ── OCR Provider ─────────────────────────────────────────────────────────
      - DEFAULT_OCR_PROVIDER=gpt4v
      - AZURE_FORM_RECOGNIZER_MODEL_ID=prebuilt-read
      # AZURE_FORM_RECOGNIZER_ENDPOINT and AZURE_FORM_RECOGNIZER_KEY: set via .env for Azure OCR
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      ocr_service:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=kyc_rag
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - API_URL=http://api:8000/api/v1
    volumes:
      - shared_data:/shared
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy

volumes:
  redis_data:
  shared_data:
  minio_data:
